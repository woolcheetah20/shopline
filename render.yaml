services:
  - type: web
    name: shopline
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/shopline run build && pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopline-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: shopline-db
    plan: free
